name: medidor_hn
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Base de datos
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.0
  
  # PDF y reportes
  pdf: ^3.10.8
  printing: ^5.13.1
  
  # Notificaciones
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  
  # Fotos y cámara
  image_picker: ^1.1.2
  
  # ════════════════════════════════════════
  # NUEVOS PAQUETES PARA LAS 7 FASES
  # ════════════════════════════════════════
  
  # Gráficas (Fase 3)
  fl_chart: ^0.68.0
  
  # Fechas y formatos (Fase 3, 4)
  intl: ^0.19.0
  
  # Export CSV/JSON (Fase 4)
  csv: ^6.0.0
  
  # Compartir archivos (Fase 4)
  share_plus: ^8.0.0
  
  # Seleccionar archivos (Fase 4 - import)
  file_picker: ^8.0.0
  
  # State Management (Fase 7)
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logomedidorhn.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - lib/assets/logomedidorhn.png